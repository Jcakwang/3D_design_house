# Nginx 配置示例 - 3D看房工具
# 用于 Nginx 部署生产环境

server {
    listen 80;
    server_name yourdomain.com;
    root /var/www/3d-house-viewer/dist;
    index index.html;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://web.amap.com; style-src 'self' 'unsafe-inline' https://web.amap.com; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://web.amap.com; frame-src https://web.amap.com;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript image/svg+xml;
    gzip_comp_level 6;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Vue Router History 模式支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service Worker 不缓存
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Proxy-Cache-Control "no-cache";
        add_header Content-Type "application/javascript";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
