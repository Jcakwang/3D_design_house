<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 550" width="650" height="550">
  <defs>
    <pattern id="grid-b" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="650" height="550" fill="#fafafa"/>
  <rect width="650" height="550" fill="url(#grid-b)"/>
  
  <!-- Title -->
  <text x="325" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2d3748">B户型 · 三室两厅</text>
  <text x="325" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#718096">建筑面积：125㎡ | 3室2厅2卫 | 南向</text>
  
  <!-- Outer walls -->
  <rect x="50" y="80" width="550" height="380" fill="none" stroke="#2d3748" stroke-width="4"/>
  
  <!-- 客厅 (Living Room) - left center -->
  <rect x="50" y="80" width="250" height="200" fill="#e6f3ff" stroke="#2d3748" stroke-width="2"/>
  <text x="175" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">客厅</text>
  <text x="175" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#718096">7.0m × 5.0m</text>
  <!-- Sofa -->
  <rect x="100" y="100" width="50" height="25" rx="5" fill="#e2e8f0" stroke="#aaa" stroke-width="1"/>
  <rect x="100" y="125" width="50" height="20" rx="5" fill="#e2e8f0" stroke="#aaa" stroke-width="1"/>
  
  <!-- 主卧 (Master Bedroom) - top center -->
  <rect x="300" y="80" width="160" height="150" fill="#fff3e6" stroke="#2d3748" stroke-width="2"/>
  <text x="380" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">主卧</text>
  <text x="380" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#718096">5.0m × 4.5m</text>
  <!-- Bed -->
  <rect x="350" y="95" width="55" height="40" rx="3" fill="#fff" stroke="#aaa" stroke-width="1.5"/>
  <rect x="353" y="98" width="22" height="13" rx="2" fill="#e2e8f0" stroke="#aaa" stroke-width="1"/>
  <rect x="377" y="98" width="22" height="13" rx="2" fill="#e2e8f0" stroke="#aaa" stroke-width="1"/>
  
  <!-- 次卧1 (Bedroom 1) - bottom left -->
  <rect x="50" y="280" width="180" height="180" fill="#e6ffe6" stroke="#2d3748" stroke-width="2"/>
  <text x="140" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">次卧1</text>
  <text x="140" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#718096">5.0m × 5.0m</text>
  <!-- Bed -->
  <rect x="100" y="300" width="50" height="38" rx="3" fill="#fff" stroke="#aaa" stroke-width="1.5"/>
  
  <!-- 次卧2 (Bedroom 2) - bottom center -->
  <rect x="230" y="280" width="160" height="100" fill="#f3e6ff" stroke="#2d3748" stroke-width="2"/>
  <text x="310" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">次卧2</text>
  <text x="310" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#718096">5.0m × 4.0m</text>
  
  <!-- 厨房 (Kitchen) - bottom right -->
  <rect x="390" y="280" width="210" height="180" fill="#fff9e6" stroke="#2d3748" stroke-width="2"/>
  <text x="495" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">厨房</text>
  <text x="495" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#718096">5.5m × 4.5m</text>
  <!-- Counter -->
  <rect x="400" y="290" width="130" height="15" rx="2" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <rect x="400" y="320" width="15" height="70" rx="2" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  
  <!-- 卫生间1 -->
  <rect x="460" y="400" width="80" height="60" fill="#e6ffff" stroke="#2d3748" stroke-width="2"/>
  <text x="500" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748">卫1</text>
  
  <!-- 卫生间2 -->
  <rect x="300" y="230" width="80" height="50" fill="#e6ffff" stroke="#2d3748" stroke-width="2"/>
  <text x="340" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748">卫2</text>
  
  <!-- Doors -->
  <line x1="300" y1="160" x2="300" y2="190" stroke="#fff" stroke-width="6"/>
  <line x1="300" y1="190" x2="300" y2="220" stroke="#e53e3e" stroke-width="2"/>
  
  <line x1="170" y1="280" x2="170" y2="310" stroke="#fff" stroke-width="6"/>
  <line x1="170" y1="310" x2="170" y2="340" stroke="#e53e3e" stroke-width="2"/>
  
  <line x1="300" y1="280" x2="300" y2="310" stroke="#fff" stroke-width="6"/>
  
  <!-- Entrance -->
  <line x1="50" y1="350" x2="80" y2="350" stroke="#e53e3e" stroke-width="3"/>
  <text x="30" y="355" font-family="Arial, sans-serif" font-size="10" fill="#e53e3e">入户</text>
  
  <!-- Windows -->
  <rect x="50" y="120" width="6" height="80" fill="#90cdf4" stroke="#4299e1" stroke-width="1"/>
  <rect x="230" y="80" width="70" height="6" fill="#90cdf4" stroke="#4299e1" stroke-width="1"/>
  <rect x="390" y="80" width="60" height="6" fill="#90cdf4" stroke="#4299e1" stroke-width="1"/>
  
  <!-- Dimensions -->
  <line x1="50" y1="500" x2="600" y2="500" stroke="#718096" stroke-width="1"/>
  <text x="325" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#718096">15m</text>
  
  <line x1="500" y1="80" x2="500" y2="460" stroke="#718096" stroke-width="1"/>
  <text x="520" y="270" font-family="Arial, sans-serif" font-size="12" fill="#718096" transform="rotate(90,520,270)">12m</text>
  
  <!-- Legend -->
  <rect x="15" y="515" width="140" height="30" rx="5" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <text x="25" y="535" font-family="Arial, sans-serif" font-size="10" fill="#718096">□ 客厅  □ 主卧  □ 次卧1  □ 厨房</text>
</svg>
