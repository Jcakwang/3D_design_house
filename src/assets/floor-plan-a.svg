<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="600" height="500" fill="#fafafa"/>
  <rect width="600" height="500" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2d3748">A户型 · 两室一厅</text>
  <text x="300" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#718096">建筑面积：89㎡ | 2室2厅1卫 | 南北朝向</text>
  
  <!-- Outer walls -->
  <rect x="80" y="80" width="440" height="340" fill="none" stroke="#2d3748" stroke-width="4"/>
  
  <!-- 客厅 (Living Room) - center-left -->
  <rect x="80" y="80" width="220" height="180" fill="#e6f3ff" stroke="#2d3748" stroke-width="2"/>
  <text x="190" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">客厅</text>
  <text x="190" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#718096">5.5m × 4.2m</text>
  
  <!-- 主卧 (Master Bedroom) - top right -->
  <rect x="300" y="80" width="220" height="160" fill="#fff3e6" stroke="#2d3748" stroke-width="2"/>
  <text x="410" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">主卧</text>
  <text x="410" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#718096">4.0m × 4.5m</text>
  <!-- Bed in master bedroom -->
  <rect x="380" y="95" width="60" height="45" rx="3" fill="#fff" stroke="#aaa" stroke-width="1.5"/>
  <rect x="383" y="98" width="24" height="15" rx="2" fill="#e2e8f0" stroke="#aaa" stroke-width="1"/>
  <rect x="413" y="98" width="24" height="15" rx="2" fill="#e2e8f0" stroke="#aaa" stroke-width="1"/>
  
  <!-- 次卧 (Second Bedroom) - bottom left -->
  <rect x="80" y="260" width="180" height="160" fill="#e6ffe6" stroke="#2d3748" stroke-width="2"/>
  <text x="170" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">次卧</text>
  <text x="170" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#718096">3.8m × 4.0m</text>
  <!-- Bed in second bedroom -->
  <rect x="130" y="280" width="55" height="40" rx="3" fill="#fff" stroke="#aaa" stroke-width="1.5"/>
  <rect x="133" y="283" width="22" height="13" rx="2" fill="#e2e8f0" stroke="#aaa" stroke-width="1"/>
  <rect x="157" y="283" width="22" height="13" rx="2" fill="#e2e8f0" stroke="#aaa" stroke-width="1"/>
  
  <!-- 厨房 (Kitchen) - bottom right -->
  <rect x="260" y="260" width="260" height="160" fill="#fff9e6" stroke="#2d3748" stroke-width="2"/>
  <text x="390" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">厨房</text>
  <text x="390" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#718096">5.0m × 3.5m</text>
  <!-- Kitchen counter -->
  <rect x="270" y="270" width="120" height="15" rx="2" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <rect x="270" y="300" width="15" height="80" rx="2" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  
  <!-- 卫生间 (Bathroom) - hidden bottom right corner -->
  <rect x="440" y="340" width="80" height="80" fill="#e6ffff" stroke="#2d3748" stroke-width="2"/>
  <text x="480" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3748">卫</text>
  
  <!-- Doors -->
  <!-- Living to Master Bedroom -->
  <line x1="300" y1="180" x2="300" y2="210" stroke="#fff" stroke-width="6"/>
  <line x1="300" y1="210" x2="300" y2="240" stroke="#e53e3e" stroke-width="2"/>
  <path d="M 300 210 Q 315 210 315 225" fill="none" stroke="#e53e3e" stroke-width="1.5" stroke-dasharray="3,3"/>
  
  <!-- Living to Second Bedroom -->
  <line x1="190" y1="260" x2="190" y2="290" stroke="#fff" stroke-width="6"/>
  <line x1="190" y1="290" x2="190" y2="320" stroke="#e53e3e" stroke-width="2"/>
  
  <!-- Living to Kitchen -->
  <line x1="290" y1="260" x2="290" y2="290" stroke="#fff" stroke-width="6"/>
  <line x1="290" y1="290" x2="290" y2="320" stroke="#e53e3e" stroke-width="2"/>
  
  <!-- Entrance door -->
  <line x1="80" y1="300" x2="110" y2="300" stroke="#e53e3e" stroke-width="3"/>
  <path d="M 110 300 Q 110 270 80 270" fill="none" stroke="#e53e3e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="55" y="305" font-family="Arial, sans-serif" font-size="11" fill="#e53e3e">入户门</text>
  
  <!-- Windows -->
  <rect x="80" y="140" width="6" height="60" fill="#90cdf4" stroke="#4299e1" stroke-width="1"/>
  <text x="70" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4299e1">窗</text>
  
  <rect x="300" y="80" width="60" height="6" fill="#90cdf4" stroke="#4299e1" stroke-width="1"/>
  
  <rect x="80" y="320" width="6" height="50" fill="#90cdf4" stroke="#4299e1" stroke-width="1"/>
  
  <!-- Dimension lines -->
  <line x1="80" y1="450" x2="520" y2="450" stroke="#718096" stroke-width="1" marker-start="url(#arrowLeft)" marker-end="url(#arrowRight)"/>
  <text x="300" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#718096">12m</text>
  
  <line x1="450" y1="80" x2="450" y2="420" stroke="#718096" stroke-width="1"/>
  <text x="470" y="250" font-family="Arial, sans-serif" font-size="12" fill="#718096" transform="rotate(90,470,250)">10m</text>
  
  <!-- Legend -->
  <rect x="15" y="460" width="130" height="30" rx="5" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <text x="25" y="475" font-family="Arial, sans-serif" font-size="10" fill="#718096">□ 客厅  □ 主卧  □ 次卧  □ 厨房</text>
</svg>
